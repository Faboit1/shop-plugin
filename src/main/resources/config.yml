# ============================================================
#  бҙ…бҙҸЙҙбҙңбҙӣsКңбҙҸбҙҳ - бҙ„бҙҸЙҙТ“ЙӘЙўбҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ
#  A fully customizable DonutSMP-style shop plugin
# ============================================================
#
# All text supports MiniMessage format:
#   <red>, <green>, <blue>, <yellow>, <gray>, <white>, <gold>
#   <gradient:#color1:#color2>text</gradient>
#   <bold>, <italic>, <underlined>, <strikethrough>
#
# Small caps text is used by default. To type small caps:
#   бҙҖКҷбҙ„бҙ…бҙҮТ“ЙўКңЙӘбҙҠбҙӢКҹбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙў
#
# Price of -1 means the item cannot be bought/sold
# Slot of -1 means auto-placement in available slots
# ============================================================

settings:
  # Economy provider: "vault", "coinsengine", or "auto"
  # "auto" will try Vault first, then CoinsEngine
  economy-provider: "auto"
  # CoinsEngine currency name (only used if CoinsEngine is the provider)
  coinsengine-currency: "coins"
  # Currency symbol for display
  currency-symbol: "$"
  # Whether to convert text to small caps automatically
  use-small-caps: true

  # Sound effects played during actions (set to "NONE" to disable)
  sounds:
    buy: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sell: "ENTITY_EXPERIENCE_ORB_PICKUP"
    error: "ENTITY_VILLAGER_NO"
    open-menu: "UI_BUTTON_CLICK"
    navigate: "UI_BUTTON_CLICK"

  # Transaction settings
  transactions:
    # How many items to buy/sell on shift-click
    shift-click-amount: 64
    # Allow middle-click to sell all of an item
    middle-click-sell-all: true

# ============================================================
#  бҙҚбҙҮssбҙҖЙўбҙҮs
# ============================================================
messages:
  # Set to false to disable the prefix entirely
  prefix-enabled: true
  prefix: "<gradient:#ff6b6b:#ffa07a>бҙ…бҙҸЙҙбҙңбҙӣsКңбҙҸбҙҳ</gradient> <dark_gray>В» <gray>"
  buy-success: "{prefix}<green>КҸбҙҸбҙң КҷбҙҸбҙңЙўКңбҙӣ <white>{amount}x {item} <green>Т“бҙҸКҖ <white>{price}"
  sell-success: "{prefix}<green>КҸбҙҸбҙң sбҙҸКҹбҙ… <white>{amount}x {item} <green>Т“бҙҸКҖ <white>{price}"
  not-enough-money: "{prefix}<red>КҸбҙҸбҙң бҙ…бҙҸЙҙ'бҙӣ КңбҙҖбҙ бҙҮ бҙҮЙҙбҙҸбҙңЙўКң бҙҚбҙҸЙҙбҙҮКҸ!"
  not-enough-items: "{prefix}<red>КҸбҙҸбҙң бҙ…бҙҸЙҙ'бҙӣ КңбҙҖбҙ бҙҮ бҙҮЙҙбҙҸбҙңЙўКң ЙӘбҙӣбҙҮбҙҚs!"
  inventory-full: "{prefix}<red>КҸбҙҸбҙңКҖ ЙӘЙҙбҙ бҙҮЙҙбҙӣбҙҸКҖКҸ ЙӘs Т“бҙңКҹКҹ!"
  no-permission: "{prefix}<red>КҸбҙҸбҙң бҙ…бҙҸЙҙ'бҙӣ КңбҙҖбҙ бҙҮ бҙҳбҙҮКҖбҙҚЙӘssЙӘбҙҸЙҙ!"
  shop-reloaded: "{prefix}<green>sКңбҙҸбҙҳ бҙ„бҙҸЙҙТ“ЙӘЙў КҖбҙҮКҹбҙҸбҙҖбҙ…бҙҮбҙ…!"

# ============================================================
#  КңбҙҸбҙңКҖКҹКҸ sКңбҙҸбҙҳ
#  A rotating selection of items that refreshes every hour,
#  exactly when the clock turns (e.g. 13:00, 14:00 вҖҰ).
#  The item pool is defined in hourly-items.yml.
# ============================================================
hourly-shop:
  enabled: true

  # Slot in the main menu where the "Hourly Shop" button appears.
  # Default: 4 (top row, centre вҖ” above the category row in a 27-slot GUI).
  featured-slot: 4

  # Title of the hourly shop sub-GUI
  gui-title: "<gradient:#ff6b6b:#ffa07a>КңбҙҸбҙңКҖКҹКҸ sКңбҙҸбҙҳ</gradient>"

  # How many items are picked from the pool each hour.
  # Changing this value automatically adjusts the slot layout:
  #   1 вҶ’ centre only  |  2 вҶ’ flanking  |  3 вҶ’ classic (11,13,15)
  #   4 вҶ’ two pairs    |  5 вҶ’ full row  |  6вҖ“9 вҶ’ full middle row
  item-count: 3

  # (Optional) Manual override for which GUI slots the items appear in.
  # Must have the same number of entries as item-count to take effect;
  # otherwise the layout is auto-computed from item-count (see above).
  item-slots:
    - 11
    - 13
    - 15

  # The button shown in the main menu at featured-slot
  button:
    material: CLOCK
    name: "<yellow>вӯҗ КңбҙҸбҙңКҖКҹКҸ sКңбҙҸбҙҳ"
    lore:
      - ""
      - "<gray>ЙҙбҙҮбҙЎ ЙӘбҙӣбҙҮбҙҚs бҙҮбҙ бҙҮКҖКҸ КңбҙҸбҙңКҖ!"
      - ""
      - "<yellow>бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ КҷКҖбҙҸбҙЎsбҙҮ!"
    glow: true

  # Rare-item settings
  # An item is "rare" when its weight is вүӨ this % of the total pool weight.
  # Rare items trigger a server-wide chat announcement + sound.
  rare:
    threshold-percent: 5.0
    # {names} = comma-separated list of rare item display names (colors stripped)
    announcement: "&d&l{names} &d&lis in the hourly shop!!"
    sound: "ENTITY_ENDER_DRAGON_GROWL"
    sound-volume: 1.0
    sound-pitch: 1.0

