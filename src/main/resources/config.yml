# ============================================================
#  ᴄᴀᴛᴇɢᴏʀʏ ɢᴜɪ ᴅᴇғᴀᴜʟᴛs
#  Configures navigation buttons, item display, etc.
# ============================================================
category-gui:
  # Navigation button configuration
  navigation:
    back:
      enabled: true
      slot: 18
      material: ARROW
      name: "<gray>Back"
    previous-page:
      slot: 21
      material: ARROW
      name: "<gray>Previous Page"
    next-page:
      slot: 23
      material: ARROW
      name: "<gray>Next Page"
    page-info:
      slot: 22
      material: PAPER
      name: "<gray>Page {page}/{total}"
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "<red>Close"

  # Item lore format when hovering over shop items
  # Available placeholders: {cost}, {buy}, {sell}, {item}
  item-lore:
    - ""
    - "<gray>Cost: <green>{cost}"

