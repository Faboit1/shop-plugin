# ============================================================
#  ᴅᴏɴᴜᴛsʜᴏᴘ - ᴄᴏɴғɪɢᴜʀᴀᴛɪᴏɴ
#  A fully customizable DonutSMP-style shop plugin
# ============================================================
#
# All text supports MiniMessage format:
#   <red>, <green>, <blue>, <yellow>, <gray>, <white>, <gold>
#   <gradient:#color1:#color2>text</gradient>
#   <bold>, <italic>, <underlined>, <strikethrough>
#
# Small caps text is used by default. To type small caps:
#   ᴀʙᴄᴅᴇғɢʜɪᴊᴋʟᴍɴᴏᴘǫʀsᴛᴜᴠᴡxʏᴢ
#
# Price of -1 means the item cannot be bought/sold
# Slot of -1 means auto-placement in available slots
# ============================================================

settings:
  # Economy provider: "vault", "coinsengine", or "auto"
  # "auto" will try Vault first, then CoinsEngine
  economy-provider: "auto"
  # CoinsEngine currency name (only used if CoinsEngine is the provider)
  coinsengine-currency: "coins"
  # Currency symbol for display
  currency-symbol: "$"
  # Whether to convert text to small caps automatically
  use-small-caps: true

  # Sound effects played during actions (set to "NONE" to disable)
  sounds:
    buy: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sell: "ENTITY_EXPERIENCE_ORB_PICKUP"
    error: "ENTITY_VILLAGER_NO"
    open-menu: "UI_BUTTON_CLICK"
    navigate: "UI_BUTTON_CLICK"

  # Transaction settings
  transactions:
    # How many items to buy/sell on shift-click
    shift-click-amount: 64
    # Allow middle-click to sell all of an item
    middle-click-sell-all: true

# ============================================================
#  ᴍᴇssᴀɢᴇs
# ============================================================
messages:
  prefix: "<gradient:#ff6b6b:#ffa07a>ᴅᴏɴᴜᴛsʜᴏᴘ</gradient> <dark_gray>» <gray>"
  buy-success: "{prefix}<green>ʏᴏᴜ ʙᴏᴜɢʜᴛ <white>{amount}x {item} <green>ғᴏʀ <white>{price}"
  sell-success: "{prefix}<green>ʏᴏᴜ sᴏʟᴅ <white>{amount}x {item} <green>ғᴏʀ <white>{price}"
  not-enough-money: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ᴍᴏɴᴇʏ!"
  not-enough-items: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ɪᴛᴇᴍs!"
  inventory-full: "{prefix}<red>ʏᴏᴜʀ ɪɴᴠᴇɴᴛᴏʀʏ ɪs ғᴜʟʟ!"
  no-permission: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪssɪᴏɴ!"
  shop-reloaded: "{prefix}<green>sʜᴏᴘ ᴄᴏɴғɪɢ ʀᴇʟᴏᴀᴅᴇᴅ!"

# ============================================================
#  ᴍᴀɪɴ ᴍᴇɴᴜ
# ============================================================
