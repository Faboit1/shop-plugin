# ============================================================
#  бҙ„бҙҖбҙӣбҙҮЙўбҙҸКҖКҸ ЙўбҙңЙӘ бҙ…бҙҮТ“бҙҖбҙңКҹбҙӣs
#  Configures navigation buttons, item display, etc.
# ============================================================
category-gui:
  # Default filler item used in all category GUIs (change here to affect all at once)
  default-filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  # Navigation button configuration
  navigation:
    back:
      enabled: true
      slot: 18
      material: TIPPED_ARROW
      name: "<gray>Back"
      potion-type: "HEALING"
    previous-page:
      slot: 21
      material: ARROW
      name: "<gray>Previous Page"
    next-page:
      slot: 23
      material: ARROW
      name: "<gray>Next Page"
    page-info:
      slot: 22
      material: PAPER
      name: "<gray>Page {page}/{total}"
    close:
      enabled: false
      slot: 26
      material: BARRIER
      name: "<red>Close"

  # Item lore format when hovering over shop items
  # Available placeholders: {cost}, {buy}, {sell}, {item}
  item-lore:
    - ""
    - "<italic><gray>бҙ„бҙҸsбҙӣ: <green>{cost}</italic>"

