  title: "<gradient:#ff6b6b:#ffa07a>ᴅᴏɴᴜᴛ sʜᴏᴘ</gradient>"
  size: 27
  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  categories:
    blocks:
      slot: 11
      icon-material: BRICKS
      icon-name: "<white>ʙʟᴏᴄᴋs"
      icon-lore:
        - ""
        - "<gray>ʙᴜɪʟᴅɪɴɢ ʙʟᴏᴄᴋs & ᴍᴀᴛᴇʀɪᴀʟs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    food:
      slot: 12
      icon-material: COOKED_BEEF
      icon-name: "<white>ꜰᴏᴏᴅ"
      icon-lore:
        - ""
        - "<gray>ᴄᴏᴏᴋᴇᴅ & ʀᴀᴡ ꜰᴏᴏᴅs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    gear:
      slot: 13
      icon-material: TOTEM_OF_UNDYING
      icon-name: "<white>ɢᴇᴀʀ"
      icon-lore:
        - ""
        - "<gray>ᴘᴠᴘ ɢᴇᴀʀ & sᴜᴘᴘʟɪᴇs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    nether:
      slot: 14
      icon-material: NETHERRACK
      icon-name: "<white>ɴᴇᴛʜᴇʀ"
      icon-lore:
        - ""
        - "<gray>ɴᴇᴛʜᴇʀ ʙʟᴏᴄᴋs & ᴅʀᴏᴘs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    end:
      slot: 15
      icon-material: END_STONE
      icon-name: "<white>ᴇɴᴅ"
      icon-lore:
        - ""
        - "<gray>ᴇɴᴅ ʙʟᴏᴄᴋs & ᴅʀᴏᴘs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: true

# ============================================================
#  ᴄᴀᴛᴇɢᴏʀʏ ɢᴜɪ ᴅᴇғᴀᴜʟᴛs
#  Configures navigation buttons, item display, etc.
# ============================================================
category-gui:
  # Default filler item used in all category GUIs (change here to affect all at once)
  default-filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  # Navigation button configuration
  navigation:
    back:
      enabled: true
      slot: 18
      material: TIPPED_ARROW
      name: "<gray>Back"
      potion-type: "HEALING"
    previous-page:
      slot: 21
      material: ARROW
      name: "<gray>Previous Page"
    next-page:
      slot: 23
      material: ARROW
      name: "<gray>Next Page"
    page-info:
      slot: 22
      material: PAPER
      name: "<gray>Page {page}/{total}"
    close:
      enabled: false
      slot: 26
      material: BARRIER
      name: "<red>Close"

  # Item lore format when hovering over shop items
  # Available placeholders: {cost}, {buy}, {sell}, {item}
  item-lore:
    - ""
    - "<italic><gray>ᴄᴏsᴛ: <green>{cost}</italic>"

# ============================================================
#  ᴄᴏɴғɪʀᴍᴀᴛɪᴏɴ ɢᴜɪ
#  Configures icons shown in the buy confirmation screen
# ============================================================
confirmation-gui:
  # Decrease amount buttons
  decrease-1:
    material: RED_STAINED_GLASS_PANE
    name: "<red>-1"
  decrease-10:
    material: RED_STAINED_GLASS_PANE
    name: "<red>-10"
  decrease-64:
    material: RED_STAINED_GLASS_PANE
    name: "<red>-64"
  # Increase amount buttons
  increase-1:
    material: LIME_STAINED_GLASS_PANE
    name: "<green>+1"
  increase-10:
    material: LIME_STAINED_GLASS_PANE
    name: "<green>+10"
  increase-64:
    material: LIME_STAINED_GLASS_PANE
    name: "<green>+64"
  # Cost info display item
  cost-info:
    material: PAPER
    name: "<gray>ᴛᴏᴛᴀʟ ᴄᴏsᴛ"
  # Confirm purchase button
  confirm:
    material: LIME_STAINED_GLASS_PANE
    name: "<green>ᴄᴏɴғɪʀᴍ ᴘᴜʀᴄʜᴀsᴇ"

