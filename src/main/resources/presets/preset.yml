# ============================================================
#  ᴅᴏɴᴜᴛsʜᴏᴘ - ᴘʀᴇsᴇᴛ ᴄᴏɴғɪɢᴜʀᴀᴛɪᴏɴ
#  Drop-in replacement for config.yml
#  5 categories — all centred in the middle row of a 27-slot menu
#    blocks | farming | mob-drops | food | tools (custom)
#
#  To activate: copy this file over your config.yml and reload.
# ============================================================

settings:
  economy-provider: "auto"
  coinsengine-currency: "coins"
  currency-symbol: "$"
  use-small-caps: true
  sounds:
    buy: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sell: "ENTITY_EXPERIENCE_ORB_PICKUP"
    error: "ENTITY_VILLAGER_NO"
    open-menu: "UI_BUTTON_CLICK"
    navigate: "UI_BUTTON_CLICK"
  transactions:
    shift-click-amount: 64
    middle-click-sell-all: true

# ============================================================
#  ᴍᴇssᴀɢᴇs
# ============================================================
messages:
  prefix: "<gradient:#ff6b6b:#ffa07a>ᴅᴏɴᴜᴛsʜᴏᴘ</gradient> <dark_gray>» <gray>"
  buy-success: "{prefix}<green>ʏᴏᴜ ʙᴏᴜɢʜᴛ <white>{amount}x {item} <green>ғᴏʀ <white>{price}"
  sell-success: "{prefix}<green>ʏᴏᴜ sᴏʟᴅ <white>{amount}x {item} <green>ғᴏʀ <white>{price}"
  not-enough-money: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ᴍᴏɴᴇʏ!"
  not-enough-items: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴇɴᴏᴜɢʜ ɪᴛᴇᴍs!"
  inventory-full: "{prefix}<red>ʏᴏᴜʀ ɪɴᴠᴇɴᴛᴏʀʏ ɪs ғᴜʟʟ!"
  no-permission: "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪssɪᴏɴ!"
  shop-reloaded: "{prefix}<green>sʜᴏᴘ ᴄᴏɴғɪɢ ʀᴇʟᴏᴀᴅᴇᴅ!"

# ============================================================
#  ᴍᴀɪɴ ᴍᴇɴᴜ  —  5 icons centred in the middle row (slots 11-15)
# ============================================================
main-menu:
  title: "<gradient:#ff6b6b:#ffa07a>         ᴅᴏɴᴜᴛ sʜᴏᴘ</gradient>"
  size: 27
  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  categories:
    blocks:
      slot: 11
      icon-material: BRICKS
      icon-name: "<gradient:#ff9a56:#ffcc80>ʙʟᴏᴄᴋs</gradient>"
      icon-lore:
        - ""
        - "<gray>ʙᴜɪʟᴅɪɴɢ ʙʟᴏᴄᴋs & ᴍᴀᴛᴇʀɪᴀʟs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    farming:
      slot: 12
      icon-material: WHEAT
      icon-name: "<gradient:#7cfc00:#98fb98>ғᴀʀᴍɪɴɢ</gradient>"
      icon-lore:
        - ""
        - "<gray>ᴄʀᴏᴘs & ғᴀʀᴍ ɪᴛᴇᴍs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    mob-drops:
      slot: 13
      icon-material: BONE
      icon-name: "<gradient:#dda0dd:#ee82ee>ᴍᴏʙ ᴅʀᴏᴘs</gradient>"
      icon-lore:
        - ""
        - "<gray>ᴅʀᴏᴘs ғʀᴏᴍ ᴍᴏʙs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    food:
      slot: 14
      icon-material: COOKED_BEEF
      icon-name: "<gradient:#ff6347:#ff4500>ғᴏᴏᴅ</gradient>"
      icon-lore:
        - ""
        - "<gray>ᴄᴏᴏᴋᴇᴅ & ʀᴀᴡ ғᴏᴏᴅs"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: false
    tools:
      slot: 15
      icon-material: IRON_SWORD
      icon-name: "<gradient:#b0c4de:#ffffff>ᴛᴏᴏʟs & ɢᴇᴀʀ</gradient>"
      icon-lore:
        - ""
        - "<gray>ᴡᴇᴀᴘᴏɴs, ᴛᴏᴏʟs & ᴀʀᴍᴏᴜʀ"
        - ""
        - "<yellow>ᴄʟɪᴄᴋ ᴛᴏ ʙʀᴏᴡsᴇ!"
      icon-glow: true

